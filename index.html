<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrega Lunchbox – AVIAM PUJ</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0F1117; color: #E2E8F0; font-family: 'DM Mono', 'Courier New', monospace; min-height: 100vh; padding-bottom: 90px; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: #1A1D27; } ::-webkit-scrollbar-thumb { background: #3A3D4A; border-radius: 2px; }

  /* HEADER */
  #header { background: #13151F; border-bottom: 1px solid #1E2130; padding: 18px 16px 14px; position: sticky; top: 0; z-index: 100; }
  #title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 2px; color: #E2E8F0; }
  #subtitle { font-size: 10px; color: #4A4D6A; letter-spacing: 1px; margin-left: 10px; }
  .progress-label { display: flex; justify-content: space-between; margin: 12px 0 5px; font-size: 11px; color: #64748B; }
  .progress-label span:last-child { color: #94A3B8; }
  #progress-bar-track { height: 4px; background: #1E2130; border-radius: 2px; overflow: hidden; margin-bottom: 12px; }
  #progress-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #6366F1, #8B5CF6); border-radius: 2px; transition: width 0.4s ease; }
  #search { width: 100%; background: #1A1D27; border: 1px solid #2D3148; border-radius: 6px; color: #E2E8F0; font-family: inherit; font-size: 12px; padding: 8px 12px; outline: none; margin-bottom: 10px; transition: border-color 0.2s; }
  #search:focus { border-color: #6366F1; }
  #search::placeholder { color: #3D4460; }
  .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { background: none; border: 1px solid #2D3148; border-radius: 4px; color: #64748B; cursor: pointer; font-family: inherit; font-size: 11px; padding: 5px 12px; letter-spacing: 0.05em; transition: all 0.15s; }
  .filter-btn.active { background: #6366F1; border-color: #6366F1; color: white; }
  .filter-btn:hover:not(.active) { border-color: #4A4D6A; color: #94A3B8; }

  /* AREAS */
  #areas { padding: 12px 16px; display: flex; flex-direction: column; gap: 10px; }
  .area-card { background: #13151F; border: 1px solid #1E2130; border-radius: 10px; overflow: hidden; }
  .area-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; border-left: 3px solid var(--color); transition: opacity 0.15s; }
  .area-header:hover { opacity: 0.85; }
  .area-title { font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 1px; color: var(--color); }
  .area-badge { font-size: 9px; background: #1E2130; color: #64748B; padding: 2px 6px; border-radius: 3px; letter-spacing: 0.5px; margin-left: 6px; }
  .area-mini-bar-wrap { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .area-mini-bar-track { flex: 1; height: 2px; background: #1E2130; border-radius: 1px; }
  .area-mini-bar-fill { height: 100%; background: var(--color); border-radius: 1px; transition: width 0.3s; }
  .area-count { font-size: 10px; color: #64748B; white-space: nowrap; }
  .area-chevron { font-size: 11px; color: #3A3D4A; margin-left: auto; flex-shrink: 0; }
  .area-body { padding: 4px 14px 12px; }

  /* ROWS */
  .person-row { display: flex; align-items: center; gap: 10px; padding: 7px 4px; border-radius: 6px; transition: background 0.15s; cursor: pointer; }
  .person-row:hover { background: rgba(255,255,255,0.04); }
  .person-row.done { opacity: 0.4; }
  .person-row.hidden { display: none; }
  .checkbox { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid #3A3D4A; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .checkbox.checked { border-color: transparent; }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }
  .person-name { font-size: 12px; color: #CBD5E1; flex: 1; transition: color 0.15s; }
  .done .person-name { color: #4A4D6A; text-decoration: line-through; }
  .person-id { font-size: 10px; color: #3A3D4A; margin-left: 6px; }
  .person-turno { font-size: 9px; color: #4A5568; background: #1A1D27; padding: 1px 5px; border-radius: 3px; margin-left: 4px; }
  .manual-tag { font-size: 9px; color: var(--color); opacity: 0.6; margin-left: 4px; }
  .del-btn { background: none; border: none; cursor: pointer; color: #EF4444; font-size: 11px; padding: 2px 5px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .person-row:hover .del-btn { opacity: 0.6; }
  .del-btn:hover { opacity: 1 !important; }

  /* ADD ROW */
  .add-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #1A1D27; }
  .add-label { font-size: 12px; color: #3A3D4A; }
  .add-input { background: transparent; border: none; border-bottom: 1px solid #2D3148; color: #94A3B8; font-family: inherit; font-size: 12px; outline: none; flex: 1; padding: 4px 0; transition: border-color 0.2s, color 0.2s; }
  .add-input::placeholder { color: #3D4460; }
  .add-input:focus { border-bottom-color: #6366F1; color: #E2E8F0; }
  .add-btn { background: none; border: none; cursor: pointer; font-size: 15px; color: #94A3B8; opacity: 0.5; padding: 2px 6px; transition: opacity 0.2s; }
  .add-btn:hover { opacity: 1; }

  /* FOOTER */
  #footer { position: fixed; bottom: 0; left: 0; right: 0; background: #0D0F18; border-top: 1px solid #1E2130; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; overflow-x: auto; gap: 12px; }
  .foot-area { text-align: center; flex-shrink: 0; }
  .foot-area-count { font-size: 13px; font-weight: 500; }
  .foot-area-label { font-size: 8px; color: #3A3D4A; letter-spacing: 0.5px; text-transform: uppercase; margin-top: 1px; }
  #foot-pct { text-align: right; flex-shrink: 0; }
  #foot-pct-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; transition: color 0.4s; }
  #foot-pct-label { font-size: 9px; color: #3A3D4A; }
</style>
</head>

// State
let state = AREAS.map(a => ({
  ...a,
  collapsed: false,
  people: a.people.map((p,i) => ({...p, key: a.id+'_'+i, checked: false, manual: false}))
}));
let currentFilter = 'all';

function gk() { return Math.random().toString(36).substr(2,9); }

function setDate() {
  const d = new Date();
  document.getElementById('today-date').textContent = d.toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
}

function updateProgress() {
  const total = state.reduce((s,a) => s + a.people.length, 0);
  const checked = state.reduce((s,a) => s + a.people.filter(p=>p.checked).length, 0);
  const pct = total > 0 ? Math.round(checked/total*100) : 0;
  document.getElementById('prog-total').textContent = total;
  document.getElementById('prog-checked').textContent = checked;
  document.getElementById('prog-pct').textContent = pct;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  updateFooter(checked, total, pct);
}

function updateFooter(checked, total, pct) {
  const el = document.getElementById('foot-pct-num');
  el.textContent = pct + '%';
  el.style.color = pct === 100 ? '#10B981' : '#E2E8F0';

  let html = '';
  state.forEach(a => {
    const c = a.people.filter(p=>p.checked).length;
    const t = a.people.length;
    const done = c === t && t > 0;
    html += `<div class="foot-area">
      <div class="foot-area-count" style="color:${done ? a.color : '#E2E8F0'}">${c}/${t}</div>
      <div class="foot-area-label">${a.name.split(' ')[0]}</div>
    </div>`;
  });
  document.getElementById('footer').innerHTML = html + `
    <div id="foot-pct">
      <div id="foot-pct-num" style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:${pct===100?'#10B981':'#E2E8F0'}">${pct}%</div>
      <div id="foot-pct-label" style="font-size:9px;color:#3A3D4A">COMPLETADO</div>
    </div>`;
}

function updateAreaBar(areaId) {
  const a = state.find(x => x.id === areaId);
  const c = a.people.filter(p=>p.checked).length;
  const t = a.people.length;
  const pct = t > 0 ? Math.round(c/t*100) : 0;
  const fill = document.querySelector(`[data-area="${areaId}"] .area-mini-bar-fill`);
  const cnt = document.querySelector(`[data-area="${areaId}"] .area-count`);
  if(fill) fill.style.width = pct + '%';
  if(cnt) cnt.textContent = c + '/' + t;
}

function toggleCheck(areaId, key) {
  const a = state.find(x => x.id === areaId);
  const p = a.people.find(x => x.key === key);
  p.checked = !p.checked;
  const row = document.querySelector(`[data-key="${key}"]`);
  if(row) {
    row.classList.toggle('done', p.checked);
    const cb = row.querySelector('.checkbox');
    cb.classList.toggle('checked', p.checked);
    cb.style.background = p.checked ? a.color : 'transparent';
    applyFilters();
  }
  updateAreaBar(areaId);
  updateProgress();
}

function toggleCollapse(areaId) {
  const a = state.find(x => x.id === areaId);
  a.collapsed = !a.collapsed;
  const card = document.querySelector(`[data-area="${areaId}"]`);
  const body = card.querySelector('.area-body');
  const chev = card.querySelector('.area-chevron');
  body.style.display = a.collapsed ? 'none' : 'block';
  chev.textContent = a.collapsed ? '▶' : '▼';
}

function addPerson(areaId) {
  const input = document.querySelector(`[data-add="${areaId}"]`);
  const name = input.value.trim();
  if(!name) return;
  const a = state.find(x => x.id === areaId);
  const key = areaId + '_' + gk();
  const newP = {name, key, checked: false, manual: true};
  // insert alphabetically
  a.people.push(newP);
  a.people.sort((x,y) => x.name.localeCompare(y.name));
  input.value = '';
  // Re-render area body people
  renderAreaPeople(areaId);
  updateAreaBar(areaId);
  updateProgress();
}

function deletePerson(areaId, key) {
  const a = state.find(x => x.id === areaId);
  a.people = a.people.filter(p => p.key !== key);
  const row = document.querySelector(`[data-key="${key}"]`);
  if(row) row.remove();
  updateAreaBar(areaId);
  updateProgress();
}

function renderPersonRow(p, a) {
  const div = document.createElement('div');
  div.className = 'person-row' + (p.checked ? ' done' : '');
  div.dataset.key = p.key;
  div.dataset.name = p.name.toLowerCase();

  const cb = document.createElement('div');
  cb.className = 'checkbox' + (p.checked ? ' checked' : '');
  cb.style.background = p.checked ? a.color : 'transparent';
  cb.innerHTML = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  
  const nameWrap = document.createElement('div');
  nameWrap.style.flex = '1';
  nameWrap.style.cursor = 'pointer';
  let nameHtml = `<span class="person-name">${p.name}</span>`;
  if(p.id) nameHtml += `<span class="person-id">#${p.id}</span>`;
  if(p.turno) nameHtml += `<span class="person-turno">${p.turno}</span>`;
  if(p.manual) nameHtml += `<span class="manual-tag" style="color:${a.color}">+ manual</span>`;
  nameWrap.innerHTML = nameHtml;

  div.addEventListener('click', (e) => {
    if(e.target.classList.contains('del-btn')) return;
    toggleCheck(a.id, p.key);
  });

  div.appendChild(cb);
  div.appendChild(nameWrap);

  if(p.manual) {
    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '✕';
    del.addEventListener('click', (e) => { e.stopPropagation(); deletePerson(a.id, p.key); });
    div.appendChild(del);
  }
  return div;
}

function renderAreaPeople(areaId) {
  const a = state.find(x => x.id === areaId);
  const body = document.querySelector(`[data-area="${areaId}"] .area-body`);
  // Remove old rows
  body.querySelectorAll('.person-row').forEach(r => r.remove());
  // Add new rows before add-row
  const addRow = body.querySelector('.add-row');
  a.people.forEach(p => {
    body.insertBefore(renderPersonRow(p, a), addRow);
  });
  applyFilters();
}

function renderAll() {
  const container = document.getElementById('areas');
  container.innerHTML = '';
  state.forEach(a => {
    const card = document.createElement('div');
    card.className = 'area-card';
    card.dataset.area = a.id;
    card.style.setProperty('--color', a.color);

    const total = a.people.length;
    const checked = a.people.filter(p=>p.checked).length;
    const pct = total > 0 ? Math.round(checked/total*100) : 0;

    card.innerHTML = `
      <div class="area-header" onclick="toggleCollapse('${a.id}')">
        <div style="flex:1">
          <div>
            <span class="area-title">${a.name}</span>
            <span class="area-badge">${a.turno}</span>
          </div>
          <div class="area-mini-bar-wrap">
            <div class="area-mini-bar-track"><div class="area-mini-bar-fill" style="width:${pct}%"></div></div>
            <span class="area-count">${checked}/${total}</span>
          </div>
        </div>
        <span class="area-chevron">▼</span>
      </div>
      <div class="area-body" ${a.collapsed ? 'style="display:none"' : ''}>
        <div class="add-row">
          <span class="add-label">+</span>
          <input class="add-input" data-add="${a.id}" placeholder="Agregar nombre..." onkeydown="if(event.key==='Enter') addPerson('${a.id}')">
          <button class="add-btn" onclick="addPerson('${a.id}')">↵</button>
        </div>
      </div>`;

    const body = card.querySelector('.area-body');
    const addRow = body.querySelector('.add-row');
    a.people.forEach(p => {
      body.insertBefore(renderPersonRow(p, a), addRow);
    });

    container.appendChild(card);
  });
  updateProgress();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.person-row').forEach(row => {
    const name = row.dataset.name || '';
    const checked = row.classList.contains('done');
    const matchSearch = name.includes(search);
    const matchFilter = currentFilter === 'all' || (currentFilter === 'pending' && !checked) || (currentFilter === 'done' && checked);
    row.classList.toggle('hidden', !(matchSearch && matchFilter));
  });
}

setDate();
renderAll();
</script>
</body>
</html>
