// ── State ─────────────────────────────────────────────────────
let state = [];
let currentFilter = 'all';
let saveTimeout   = null;

function buildState(savedData) {
  const checkedSet   = new Set(savedData ? (savedData.checked   || []) : []);
  const collapsedSet = new Set(savedData ? (savedData.collapsed || []) : []);
  const savedManuals = savedData ? (savedData.manuals || []) : [];
  return AREAS.map(a => {
    const people = a.people.map((p, i) => ({
      ...p, key: a.id + '_' + i,
      checked: checkedSet.has(a.id + '|' + p.name),
      manual: false
    }));
    savedManuals.filter(m => m.areaId === a.id).forEach(m => {
      if (!people.find(p => p.name === m.name))
        people.push({ name: m.name, key: a.id + '_m_' + m.name, checked: !!m.checked, manual: true });
    });
    people.sort((x, y) => x.name.localeCompare(y.name));
    return { ...a, collapsed: collapsedSet.has(a.id), people };
  });
}

function buildPayload() {
  const checked = [], collapsed = [], manuals = [];
  state.forEach(a => {
    if (a.collapsed) collapsed.push(a.id);
    a.people.forEach(p => {
      if (p.checked) checked.push(a.id + '|' + p.name);
      if (p.manual)  manuals.push({ areaId: a.id, name: p.name, checked: p.checked });
    });
  });
  return { checked, collapsed, manuals, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
}

// ── Sync indicator ────────────────────────────────────────────
function setSyncStatus(s) {
  const dot  = document.getElementById('sync-dot');
  const txt  = document.getElementById('sync-text');
  dot.className  = 'sync-dot' + (s === 'syncing' ? ' syncing' : s === 'error' ? ' error' : '');
  txt.textContent = s === 'syncing' ? 'GUARDANDO...' : s === 'error' ? 'ERROR AL GUARDAR' : 'SINCRONIZADO';
}

function saveToFirebase() {
  clearTimeout(saveTimeout);
  setSyncStatus('syncing');
  saveTimeout = setTimeout(async () => {
    try {
      await DOC_REF.set(buildPayload());
      setSyncStatus('ok');
    } catch(e) {
      setSyncStatus('error');
      console.error(e);
    }
  }, 500);
}

// ── UI ────────────────────────────────────────────────────────
function gk() { return Math.random().toString(36).substr(2,9); }

function setDate() {
  document.getElementById('today-date').textContent =
    new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
}

function updateProgress() {
  const total   = state.reduce((s,a) => s + a.people.length, 0);
  const checked = state.reduce((s,a) => s + a.people.filter(p=>p.checked).length, 0);
  const pct     = total > 0 ? Math.round(checked / total * 100) : 0;
  document.getElementById('prog-total').textContent   = total;
  document.getElementById('prog-checked').textContent = checked;
  document.getElementById('prog-pct').textContent     = pct;
  document.getElementById('progress-bar-fill').style.width = pct + '%';
  let html = '';
  state.forEach(a => {
    const c = a.people.filter(p=>p.checked).length, t = a.people.length;
    html += `<div class="foot-area">
      <div class="foot-area-count" style="color:${c===t&&t>0?a.color:'#E2E8F0'}">${c}/${t}</div>
      <div class="foot-area-label">${a.name.split(' ')[0]}</div></div>`;
  });
  html += `<div style="text-align:right;flex-shrink:0;margin-left:auto">
    <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:${pct===100?'#10B981':'#E2E8F0'}">${pct}%</div>
    <div style="font-size:9px;color:#3A3D4A">COMPLETADO</div></div>`;
  document.getElementById('footer').innerHTML = html;
}

function updateAreaBar(areaId) {
  const a = state.find(x => x.id === areaId);
  const c = a.people.filter(p=>p.checked).length, t = a.people.length;
  const pct = t > 0 ? Math.round(c/t*100) : 0;
  const fill = document.querySelector(`[data-area="${areaId}"] .area-mini-bar-fill`);
  const cnt  = document.querySelector(`[data-area="${areaId}"] .area-count`);
  if(fill) fill.style.width = pct + '%';
  if(cnt)  cnt.textContent  = c + '/' + t;
}

// ── Actions ───────────────────────────────────────────────────
function toggleCheck(areaId, key) {
  const a = state.find(x => x.id === areaId);
  const p = a.people.find(x => x.key === key);
  p.checked = !p.checked;
  const row = document.querySelector(`[data-key="${key}"]`);
  if(row) {
    row.classList.toggle('done', p.checked);
    const cb = row.querySelector('.checkbox');
    cb.classList.toggle('checked', p.checked);
    cb.style.background = p.checked ? a.color : 'transparent';
    applyFilters();
  }
  updateAreaBar(areaId);
  updateProgress();
  saveToFirebase();
}

function toggleCollapse(areaId) {
  const a = state.find(x => x.id === areaId);
  a.collapsed = !a.collapsed;
  const card = document.querySelector(`[data-area="${areaId}"]`);
  card.querySelector('.area-body').style.display    = a.collapsed ? 'none' : 'block';
  card.querySelector('.area-chevron').textContent   = a.collapsed ? '▶' : '▼';
  saveToFirebase();
}

function addPerson(areaId) {
  const input = document.querySelector(`[data-add="${areaId}"]`);
  const name  = input.value.trim();
  if(!name) return;
  const a = state.find(x => x.id === areaId);
  a.people.push({ name, key: areaId + '_m_' + gk(), checked: false, manual: true });
  a.people.sort((x,y) => x.name.localeCompare(y.name));
  input.value = '';
  renderAreaPeople(areaId);
  updateAreaBar(areaId);
  updateProgress();
  saveToFirebase();
}

function deletePerson(areaId, key) {
  const a = state.find(x => x.id === areaId);
  a.people = a.people.filter(p => p.key !== key);
  document.querySelector(`[data-key="${key}"]`)?.remove();
  updateAreaBar(areaId);
  updateProgress();
  saveToFirebase();
}

function resetState() {
  if(!confirm('¿Borrar todo el progreso guardado en Firebase?')) return;
  DOC_REF.delete().then(() => location.reload()).catch(e => alert('Error: ' + e.message));
}

// ── Render ────────────────────────────────────────────────────
function renderPersonRow(p, a) {
  const div = document.createElement('div');
  div.className    = 'person-row' + (p.checked ? ' done' : '');
  div.dataset.key  = p.key;
  div.dataset.name = p.name.toLowerCase();
  div.style.setProperty('--color', a.color);

  const cb = document.createElement('div');
  cb.className = 'checkbox' + (p.checked ? ' checked' : '');
  cb.style.background = p.checked ? a.color : 'transparent';
  cb.innerHTML = `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const nw = document.createElement('div');
  nw.style.flex = '1';
  let html = `<span class="person-name">${p.name}</span>`;
  if(p.id)     html += `<span class="person-id">#${p.id}</span>`;
  if(p.turno)  html += `<span class="person-turno">${p.turno}</span>`;
  if(p.manual) html += `<span class="manual-tag">+ manual</span>`;
  nw.innerHTML = html;

  div.addEventListener('click', e => { if(!e.target.classList.contains('del-btn')) toggleCheck(a.id, p.key); });
  div.appendChild(cb);
  div.appendChild(nw);

  if(p.manual) {
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '✕';
    del.addEventListener('click', e => { e.stopPropagation(); deletePerson(a.id, p.key); });
    div.appendChild(del);
  }
  return div;
}

function renderAreaPeople(areaId) {
  const a    = state.find(x => x.id === areaId);
  const body = document.querySelector(`[data-area="${areaId}"] .area-body`);
  body.querySelectorAll('.person-row').forEach(r => r.remove());
  const addRow = body.querySelector('.add-row');
  a.people.forEach(p => body.insertBefore(renderPersonRow(p, a), addRow));
  applyFilters();
}

function renderAll() {
  const container = document.getElementById('areas');
  container.innerHTML = '';
  state.forEach(a => {
    const c = a.people.filter(p=>p.checked).length, t = a.people.length;
    const pct = t > 0 ? Math.round(c/t*100) : 0;
    const card = document.createElement('div');
    card.className = 'area-card'; card.dataset.area = a.id;
    card.style.setProperty('--color', a.color);
    card.innerHTML = `
      <div class="area-header" onclick="toggleCollapse('${a.id}')">
        <div style="flex:1">
          <div><span class="area-title">${a.name}</span><span class="area-badge">${a.turno}</span></div>
          <div class="area-mini-bar-wrap">
            <div class="area-mini-bar-track"><div class="area-mini-bar-fill" style="width:${pct}%"></div></div>
            <span class="area-count">${c}/${t}</span>
          </div>
        </div>
        <span class="area-chevron">${a.collapsed?'▶':'▼'}</span>
      </div>
      <div class="area-body" ${a.collapsed?'style="display:none"':''}>
        <div class="add-row">
          <span class="add-label">+</span>
          <input class="add-input" data-add="${a.id}" placeholder="Agregar nombre..." onkeydown="if(event.key==='Enter') addPerson('${a.id}')">
          <button class="add-btn" onclick="addPerson('${a.id}')">↵</button>
        </div>
      </div>`;
    const body = card.querySelector('.area-body');
    const addRow = body.querySelector('.add-row');
    a.people.forEach(p => body.insertBefore(renderPersonRow(p, a), addRow));
    container.appendChild(card);
  });
  updateProgress();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.person-row').forEach(row => {
    const ok = row.dataset.name.includes(search) &&
      (currentFilter==='all' || (currentFilter==='pending'&&!row.classList.contains('done')) || (currentFilter==='done'&&row.classList.contains('done')));
    row.classList.toggle('hidden', !ok);
  });
}

// ── Excel ─────────────────────────────────────────────────────
function exportExcel() {
  const wb = XLSX.utils.book_new();
  const resumen = [['ENTREGA LUNCHBOX – AVIAM PUJ','','','',''],
    ['Fecha:',new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'long',year:'numeric'}),'','',''],
    ['','','','',''],['ÁREA','TURNO','ENTREGADOS','PENDIENTES','TOTAL']];
  state.forEach(a => { const c=a.people.filter(p=>p.checked).length; resumen.push([a.name,a.turno,c,a.people.length-c,a.people.length]); });
  const tC=state.reduce((s,a)=>s+a.people.filter(p=>p.checked).length,0), tT=state.reduce((s,a)=>s+a.people.length,0);
  resumen.push(['','','','',''],['TOTAL GENERAL','',tC,tT-tC,tT]);
  const ws1=XLSX.utils.aoa_to_sheet(resumen); ws1['!cols']=[{wch:30},{wch:18},{wch:14},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws1,'Resumen');
  const det=[['NO. EMPLEADO','NOMBRE','ÁREA','TURNO','ESTADO','MANUAL']];
  state.forEach(a=>a.people.forEach(p=>det.push([p.id||'',p.name,a.name,p.turno||a.turno,p.checked?'ENTREGADO':'PENDIENTE',p.manual?'SÍ':'NO'])));
  const ws2=XLSX.utils.aoa_to_sheet(det); ws2['!cols']=[{wch:14},{wch:36},{wch:26},{wch:16},{wch:12},{wch:8}];
  XLSX.utils.book_append_sheet(wb,ws2,'Detalle');
  const pend=[['NO. EMPLEADO','NOMBRE','ÁREA','TURNO']];
  state.forEach(a=>a.people.filter(p=>!p.checked).forEach(p=>pend.push([p.id||'',p.name,a.name,p.turno||a.turno])));
  const ws3=XLSX.utils.aoa_to_sheet(pend); ws3['!cols']=[{wch:14},{wch:36},{wch:26},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws3,'Pendientes');
  const entr=[['NO. EMPLEADO','NOMBRE','ÁREA','TURNO']];
  state.forEach(a=>a.people.filter(p=>p.checked).forEach(p=>entr.push([p.id||'',p.name,a.name,p.turno||a.turno])));
  const ws4=XLSX.utils.aoa_to_sheet(entr); ws4['!cols']=[{wch:14},{wch:36},{wch:26},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws4,'Entregados');
  XLSX.writeFile(wb,`Lunchbox_AVIAM_${new Date().toLocaleDateString('es-DO',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'-')}.xlsx`);
}

// ── Boot ──────────────────────────────────────────────────────
async function init() {
  setDate();
  try {
    document.getElementById('loading-msg').textContent = 'CARGANDO DATOS...';
    const doc = await DOC_REF.get();
    state = buildState(doc.exists ? doc.data() : null);
  } catch(e) {
    console.error('Firebase load error:', e);
    document.getElementById('loading-msg').textContent = 'SIN CONEXIÓN – MODO LOCAL';
    await new Promise(r => setTimeout(r, 1500));
    state = buildState(null);
  }
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('header').style.display = 'block';
  renderAll();
}

init();
</script>
